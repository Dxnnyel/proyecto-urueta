{% extends 'crud_app/base.html' %}
{% block title %}Recuperar contraseña — Urueta{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon"><i class="fas fa-lock"></i></div>
      <h2>Recuperar contraseña</h2>
      <p>Te enviaremos un enlace a tu correo</p>
    </div>
    <div class="auth-body">
      <form method="POST">
        {% csrf_token %}
        <label class="form-label">Correo electrónico</label>
        <input type="email" name="email" class="form-control mb-3" placeholder="tu@correo.com" required>
        <button type="submit" class="btn-uu btn-uu-red w-100">
          <i class="fas fa-paper-plane me-2"></i>Enviar enlace
        </button>
      </form>
    </div>
    <div class="auth-footer">
      <a href="{% url 'login' %}"><i class="fas fa-arrow-left me-1"></i>Volver al login</a>
    </div>
  </div>
</div>
{% endblock %}

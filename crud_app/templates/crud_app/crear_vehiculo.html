{% extends 'crud_app/base.html' %}
{% block title %}Registrar Vehículo — Admin{% endblock %}

{% block content %}
<div class="pt-4">
  <div class="page-header">
    <h1>Registrar Vehículo</h1>
    <p>Control de entrada y salida del taller</p>
  </div>

  <div class="row g-4">
    <!-- FORM REGISTRO -->
    <div class="col-lg-8">
      <div class="service-card">
        <form id="formVehiculo">
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label">Placa</label>
              <input type="text" class="form-control" name="placa" required maxlength="10">
            </div>
            <div class="col-md-4">
              <label class="form-label">Fecha Entrada</label>
              <input type="date" class="form-control" name="fecha_entrada" required>
            </div>
            <div class="col-md-4">
              <label class="form-label">Responsable</label>
              <input type="text" class="form-control" name="responsable" required>
            </div>
            <div class="col-12">
              <label class="form-label">Servicios</label>
              <div class="row g-2">
                <div class="col-6 col-md-4">
                  <label class="form-check-label">
                    <input type="checkbox" class="form-check-input" name="servicios[]" value="mecanica"> Mecánica
                  </label>
                </div>
                <div class="col-6 col-md-4">
                  <label class="form-check-label">
                    <input type="checkbox" class="form-check-input" name="servicios[]" value="electrica"> Eléctrica
                  </label>
                </div>
                <div class="col-6 col-md-4">
                  <label class="form-check-label">
                    <input type="checkbox" class="form-check-input" name="servicios[]" value="aire"> Aire A/C
                  </label>
                </div>
                <div class="col-6 col-md-4">
                  <label class="form-check-label">
                    <input type="checkbox" class="form-check-input" name="servicios[]" value="latoneria"> Latonería
                  </label>
                </div>
                <div class="col-6 col-md-4">
                  <label class="form-check-label">
                    <input type="checkbox" class="form-check-input" name="servicios[]" value="pintura"> Pintura
                  </label>
                </div>
              </div>
            </div>
            <div class="col-12">
              <label class="form-label">Observaciones</label>
              <textarea class="form-control" name="observaciones" rows="3"></textarea>
            </div>
          </div>
          <button type="submit" class="btn-uu-red w-100 mt-3">Registrar Vehículo</button>
        </form>
      </div>
    </div>

    <!-- LISTA VEHÍCULOS -->
    <div class="col-lg-4">
      <div class="service-card">
        <h5>Vehículos Activos</h5>
        <div id="listaVehiculosActivos" class="mt-3">
          <!-- JS carga aquí -->
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL ELIMINAR -->
<div class="modal fade" id="modalEliminar" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content" style="background:var(--carbon-3);border:1px solid var(--borde);color:var(--texto-1);">
      <div class="modal-header border-0">
        <h6 class="modal-title"><i class="fas fa-lock me-2" style="color:var(--rojo)"></i>Confirmar eliminación</h6>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p>Ingresa contraseña de admin:</p>
        <input type="password" id="passEliminar" class="form-control" placeholder="Contraseña">
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-uu-outline" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" id="btnConfirmarEliminar" class="btn btn-danger">Eliminar</button>
      </div>
    </div>
  </div>
</div>

<script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  // Cargar vehículos activos al inicio
  uruetaSistema.mostrarVehiculosActivos();
  
  // Registrar vehículo
  document.getElementById('formVehiculo').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const formData = new FormData(this);
    const vehiculo = {
      id: Date.now(),
      placa: formData.get('placa').toUpperCase(),
      fecha_entrada: formData.get('fecha_entrada'),
      fecha_salida: null,
      servicios: Array.from(document.querySelectorAll('input[name="servicios[]"]:checked')).map(cb => cb.value),
      responsable: formData.get('responsable'),
      observaciones: formData.get('observaciones') || ''
    };
    
    uruetaSistema.vehiculos.push(vehiculo);
    uruetaSistema.guardarLocal();
    
    // Mensaje éxito
    uruetaSistema.mostrarMensaje(`✅ Vehículo ${vehiculo.placa} registrado`, 'success');
    
    // Reset form
    this.reset();
    
    // Recargar lista
    uruetaSistema.mostrarVehiculosActivos();
  });

  // Eliminar vehículo
  window.eliminarVehiculo = function(id) {
    const placa = uruetaSistema.vehiculos.find(v => v.id === id)?.placa;
    if(confirm(`¿Eliminar vehículo ${placa}?`)) {
      const modal = new bootstrap.Modal(document.getElementById('modalEliminar'));
      window.vehiculoAEliminar = id;
      modal.show();
    }
  }

  // Confirmar eliminación
  document.getElementById('btnConfirmarEliminar').onclick = function() {
    const pass = document.getElementById('passEliminar').value;
    if(pass === 'urueta2025') {  // ✅ CAMBIA ESTA CONTRASEÑA
      const id = window.vehiculoAEliminar;
      const indice = uruetaSistema.vehiculos.findIndex(v => v.id === id);
      if(indice > -1) {
        uruetaSistema.vehiculos.splice(indice, 1);
        uruetaSistema.guardarLocal();
        uruetaSistema.mostrarVehiculosActivos();
        uruetaSistema.mostrarMensaje('🗑️ Vehículo eliminado permanentemente', 'success');
      }
      bootstrap.Modal.getInstance(document.getElementById('modalEliminar')).hide();
    } else {
      uruetaSistema.mostrarMensaje('❌ Contraseña incorrecta', 'error');
    }
    document.getElementById('passEliminar').value = '';
  }
});
</script>
</script>
{% endblock %}

{% extends 'crud_app/base.html' %}

{% block title %}Eliminar producto - Urueta{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card border-0 shadow-sm p-4" style="background:var(--carbon-3,#1a1a1a);border:1px solid var(--borde) !important">
      <h2 class="mb-4" style="color:#fff">Eliminar producto</h2>
      <p style="color:var(--texto-2)">¿Estás seguro de que quieres eliminar el producto "<strong style="color:#fff">{{ producto.nombre }}</strong>"?</p>
      <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Eliminar</button>
        <a href="{% url 'lista_productos' %}" class="btn btn-outline-light ms-2">Cancelar</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}

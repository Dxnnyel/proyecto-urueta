{% extends 'crud_app/base.html' %}
{% block title %}Ingresar — Urueta & Urueta{% endblock %}

{% block content %}
<style>
  .auth-wrap {
    min-height: calc(100vh - 160px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 0;
  }
  .auth-card {
    background: var(--gris-2);
    border: 1px solid var(--borde);
    border-radius: 8px;
    width: 100%;
    max-width: 420px;
    overflow: hidden;
  }
  .auth-header {
    background: var(--gris-1);
    border-bottom: 1px solid var(--borde);
    padding: 2rem 2rem 1.5rem;
    text-align: center;
  }
  .auth-icon {
    width: 56px;
    height: 56px;
    background: rgba(215,43,43,0.12);
    border: 1px solid rgba(215,43,43,0.3);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1rem;
  }
  .auth-icon i { color: var(--rojo); font-size: 22px; }
  .auth-header h2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 26px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #fff;
    margin-bottom: .25rem;
  }
  .auth-header p { color: var(--texto-2); font-size: 13px; }
  .auth-body { padding: 2rem; }
  .auth-footer {
    text-align: center;
    padding: 1.25rem 2rem;
    border-top: 1px solid var(--borde);
    font-size: 13px;
    color: var(--texto-2);
  }
  .auth-footer a { color: var(--rojo); text-decoration: none; }
  .auth-footer a:hover { text-decoration: underline; }
</style>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon"><i class="fas fa-right-to-bracket"></i></div>
      <h2>Iniciar Sesión</h2>
      <p>Ingresa tus credenciales para continuar</p>
    </div>
    <div class="auth-body">
      <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Usuario</label>
          <div class="search-wrap">
            <i class="fas fa-user"></i>
            <input type="text" class="form-control" name="username" placeholder="Tu nombre de usuario" required>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label">Contraseña</label>
          <div class="search-wrap">
            <i class="fas fa-lock"></i>
            <input type="password" class="form-control" name="password" placeholder="••••••••" required>
          </div>
        </div>
        <button type="submit" class="btn-uu btn-uu-red w-100">
          <i class="fas fa-right-to-bracket me-2"></i> Ingresar
        </button>
      </form>
    </div>
    <div class="auth-footer">
      ¿No tienes cuenta? <a href="{% url 'register' %}">Regístrate aquí</a>
      <br>
      <a href="{% url 'password_reset' %}" style="font-size:12px;color:var(--texto-2)">¿Olvidaste tu contraseña?</a>
    </div>
  </div>
</div>
{% endblock %}

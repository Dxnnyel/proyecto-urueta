{% extends 'crud_app/base.html' %}

{% block title %}Inicio - Urueta{% endblock %}

{% block content %}
<div class="card">
  <div class="card-body">
    <h2 class="card-title">Bienvenido {{ user.username }}</h2>
    <p class="card-text">Has iniciado sesión correctamente en el proyecto Urueta &amp; Urueta.</p>
    <a href="{% url 'lista_productos' %}" class="btn btn-danger">Ver productos</a>
    {% if user.is_staff %}
      <a href="{% url 'crear_vehiculo' %}" class="btn btn-outline-light ms-2">Registrar Vehículo</a>
    {% endif %}
  </div>
</div>
{% endblock %}
